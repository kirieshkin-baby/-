<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Страница не найдена | Герои Элисты</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Playfair+Display:wght@700&display=swap&quot;" rel="stylesheet">
    <style>
        .error-page {
            min-height: 85vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
        }

        .error-content {
            max-width: 700px;
        }

        .error-code {
            font-size: 9.5rem;
            font-weight: 700;
            color: var(--primary);
            line-height: 1;
            margin: 0 0 20px 0;
            text-shadow: 0 10px 30px rgba(200, 16, 46, 0.4);
        }

        .error-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            color: var(--accent);
            margin-bottom: 20px;
        }

        .error-text {
            font-size: 1.35rem;
            color: var(--text-muted);
            margin-bottom: 40px;
        }

        .error-image {
            max-width: 380px;
            margin: 30px auto;
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header__inner">
                <div class="logo">
                    <div class="logo-icon">
                        <span class="star">★</span>
                    </div>
                    <div class="logo__text">
                        <span class="main-text">ГЕРОИ</span>
                        <span class="sub-text">ЭЛИСТЫ</span>
                    </div>
                </div>

                <nav class="nav">
                    <ul class="nav__list">
                        <li><a href="index.html">Главная</a></li>
                        <li><a href="registration.html">Регистрация</a></li>
                        <li><a href="excursion.html">Расписание</a></li>
                        <li><a href="account.html">Личный кабинет</a></li>
                        <li><a href="route.html">Маршрут</a></li>
                    </ul>
                </nav>

                <button id="theme-toggle" class="theme-toggle">🌙</button>
            </div>
        </div>
    </header>

    <main>
        <section class="error-page">
            <div class="error-content">
                <h1 class="error-code">404</h1>
                <h2 class="error-title">Страница не найдена</h2>
                <p class="error-text">
                    К сожалению, страница, которую вы ищете, не существует.

                    Возможно, она была перемещена или удалена.
                </p>
                <a href="index.html" class="btn" style="font-size: 1.25rem; padding: 18px 50px;">
                    Вернуться на главную
                </a>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>Телефон: <a href="tel:+74842234567">+7 (4842) 23-45-67</a></p>
            <p>Email: <a href="mailto:family@cosmos.ru">family@cosmos.ru</a></p>
        </div>
    </footer>

    <script src="main.js"></script>
</body>
</html>
